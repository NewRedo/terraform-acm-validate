name: Check OpenTofu

on: pull_request

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.10.9
      - name: OpenTofu Format Check
        run: tofu fmt -check -recursive
      - name: OpenTofu Init
        run: tofu init -backend=false
      - name: OpenTofu Validate
        run: tofu validate
